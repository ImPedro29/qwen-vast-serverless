name: Build and Push vast image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.vast

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.vast
          platforms: linux/amd64
          push: true
          tags: ghcr.io/impedro29/qwen-vast-sglang:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
